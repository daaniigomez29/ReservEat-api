spring:
  application:
    name: restaurant-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  flyway:
    # Schema migrations live in classpath:db/migration (V1__init.sql, V2__..., ...).
    # baseline-on-migrate lets Flyway adopt a pre-existing, non-empty schema
    # (e.g. a DB previously built by Hibernate ddl-auto) by marking the baseline
    # as already applied instead of failing.
    baseline-on-migrate: true

# Actuator: expose only health/info. The platform (Railway) uses health for
# liveness/readiness checks. With the API context-path, the URL is
# /api/v1/actuator/health.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

server:   
  port: 8080
  servlet:
    context-path: /api/v1

reservation:
  # Minimum gap (minutes) enforced between two reservations on the same table
  # to allow cleanup/turnover. Applied when checking table availability.
  turnover-buffer-minutes: ${RESERVATION_TURNOVER_BUFFER:30}
  # Anti-duplicate window (seconds): a second identical booking by the same user
  # within this window is treated as an accidental double-submit and deduplicated.
  dedup-window-seconds: ${RESERVATION_DEDUP_WINDOW:10}
  
  reminder:
    # Remind bookers about confirmed reservations starting within this many hours.
    lead-time-hours: ${REMINDER_LEAD_TIME_HOURS:24}
    # How often the reminder job runs (Spring cron: sec min hour day month weekday).
    cron: ${REMINDER_CRON:0 */15 * * * *}

jwt:
  expiration: 900000       # 24 hours in ms
  refresh-expiration: 604800000  # 7 days in ms


app:
  verification:
    # How long a verification link stays valid.
    token-ttl-hours: ${VERIFICATION_TTL_HOURS:24}
    # Public URL of this API's GET /auth/verify endpoint, embedded in the email link.
    verify-base-url: ${VERIFY_BASE_URL:http://localhost:8080/api/v1/auth/verify}
  frontend:
    # Pages the user is redirected to after clicking the verification link.
    email-verified-url: ${FRONTEND_EMAIL_VERIFIED_URL:http://localhost:3000/email-verificado}
    email-verify-error-url: ${FRONTEND_EMAIL_VERIFY_ERROR_URL:http://localhost:3000/email-error}

